<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immediate Help</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .top-bar {
            background-color: #1a73e8;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 24px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 8px;
        }

        .top-bar a:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #222;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .search-box {
            border: 1px solid #d9e2f2;
            background-color: #eef4ff;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1a4f9c;
            margin-bottom: 20px;
        }

        .cancel-btn {
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e0e0e0;
            color: #333;
        }

        .cancel-btn:hover {
            background-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Nurse Connect</h1>
        <a href="index.html">Home</a>
    </div>

    <div class="container">
        <h2>Connect to the First Available Nurse</h2>
        <p class="subtitle">Connecting you immediately to the first available nurse</p>

        <div class="search-box">
            Searching for the first available nurse
        </div>

        <button class="cancel-btn" onclick="window.location.href='index.html'">Cancel</button>
    </div>
</body>
</html>
