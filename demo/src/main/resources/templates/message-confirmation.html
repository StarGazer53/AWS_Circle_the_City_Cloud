<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Message Sent</title>
    <style>
        body {
            background-color: #efefef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px 40px;
        }

        .container {
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 46px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            color: #444;
            margin-bottom: 18px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 24px;
            border-radius: 10px;
            background-color: #2d72d9;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${pageTitle}">Message Sent</h1>
        <p th:text="${message}">Your message has been saved.</p>
        <a th:href="@{/}">Return Home</a>
    </div>
</body>
</html>
