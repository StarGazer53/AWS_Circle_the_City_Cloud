<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Circle the City Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 5px;
            color: #222;
        }

        p {
            color: #555;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f0f2f5;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background-color: #e8f0fe;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${title}">Circle the City Callback Queue</h1>
        <p th:text="${subtitle}">Cloud-based patient communication demo</p>

        <table>
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Callback Number</th>
                    <th>Request Type</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="request : ${requests}">
                    <td th:text="${request.patientName}">Patient Name</td>
                    <td th:text="${request.callbackNumber}">Phone Number</td>
                    <td>
                        <span class="tag" th:text="${request.requestType}">Request Type</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
