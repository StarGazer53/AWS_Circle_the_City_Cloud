<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Immediate Help</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .top-bar {
            background-color: #1a73e8;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 24px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 8px;
        }

        .top-bar a:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #222;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .patient-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 18px;
            background-color: #fafafa;
            margin-bottom: 20px;
        }

        .nurse-card {
            border: 1px solid #d9e2f2;
            background-color: #eef4ff;
            border-radius: 10px;
            padding: 25px;
        }

        .nurse-card p {
            margin: 8px 0;
            color: #222;
        }

        .cancel-btn {
            display: inline-block;
            margin-top: 20px;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e0e0e0;
            color: #333;
            text-decoration: none;
        }

        .cancel-btn:hover {
            background-color: #cfcfcf;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>Nurse Connect</h1>
        <a th:href="@{/}">Home</a>
    </div>

    <div class="container">
        <h2 th:text="${pageTitle}">Immediate Help</h2>
        <p class="subtitle" th:text="${subtitle}">Connecting you immediately to the first available nurse.</p>

        <div class="patient-box" th:if="${patientFirstName != null}">
            <p>
                <strong>Patient:</strong>
                <span th:text="${patientFirstName}">First</span>
                <span th:text="${patientLastName}">Last</span>
            </p>
            <p>
                <strong>Date of Birth:</strong>
                <span th:text="${dob}">2000-01-01</span>
            </p>
        </div>

        <div class="nurse-card">
            <p><strong>Name:</strong> <span th:text="${nurse.fullName}">Nurse Name</span></p>
            <p><strong>Email:</strong> <span th:text="${nurse.email}">nurse@example.com</span></p>
            <p><strong>Phone:</strong> <span th:text="${nurse.phoneNumber}">(000) 000-0000</span></p>
            <p><strong>Department:</strong> <span th:text="${nurse.department}">Department</span></p>
            <p><strong>Available:</strong> <span th:text="${nurse.available} ? 'Yes' : 'No'">Yes</span></p>
        </div>

        <a th:href="@{/}" class="cancel-btn">Back to Home</a>
    </div>
</body>
</html>
