<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Immediate Help</title>

    <style>
        body {
            background-color: #efefef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px 40px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 52px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 22px;
            color: #555;
            margin-bottom: 40px;
        }

        .nurse-card {
            display: flex;
            gap: 30px;
            align-items: center;
            background: #f8f9fb;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #ddd;
        }

        .nurse-card img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #dbe7ff;
        }

        .nurse-info {
            font-size: 22px;
            line-height: 1.8;
        }

        .nurse-info strong {
            color: #222;
        }

        .busy-box {
            margin-top: 30px;
            padding: 25px;
            background-color: #fff4f4;
            border: 1px solid #e7bcbc;
            border-radius: 12px;
            text-align: center;
        }

        .busy-box p {
            font-size: 22px;
            color: #a12222;
            margin-bottom: 25px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        button, a {
            padding: 14px 22px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .primary-btn {
            background-color: #2d72d9;
            color: white;
        }

        .primary-btn:hover {
            background-color: #1f5fbe;
        }

        .secondary-btn {
            background-color: #d9d9d9;
            color: #222;
        }

        .secondary-btn:hover {
            background-color: #c8c8c8;
        }

        .back-wrapper {
            text-align: center;
            margin-top: 40px;
        }

        .back-link {
            background-color: #f0f0f0;
            color: #222;
        }
    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${pageTitle}">Immediate Help</h1>
    <div class="subtitle" th:text="${subtitle}">
        Here is the first available nurse:
    </div>

    <div class="nurse-card">
        <img th:src="${nurse.imageUrl}" alt="Nurse Photo">

        <div class="nurse-info">
            <div><strong>Name:</strong> <span th:text="${nurse.fullName}">Name</span></div>
            <div><strong>Email:</strong> <span th:text="${nurse.email}">Email</span></div>
            <div><strong>Phone:</strong> <span th:text="${nurse.phoneNumber}">Phone</span></div>
            <div><strong>Department:</strong> <span th:text="${nurse.department}">Department</span></div>
        </div>
    </div>

    <div class="busy-box" th:if="${busy}">
        <p>
            This assigned nurse is currently busy.<br>
            Would you like to leave a message or connect to the next available nurse?
        </p>

        <div class="button-row">
            <form th:action="@{/next-available-nurse}" method="post">
                <input type="hidden" name="firstName" th:value="${firstName}">
                <input type="hidden" name="lastName" th:value="${lastName}">
                <input type="hidden" name="dob" th:value="${dob}">
                <button type="submit" class="primary-btn">
                    Next Available Nurse
                </button>
            </form>

            <form th:action="@{/leave-message}" method="post">
                <input type="hidden" name="firstName" th:value="${firstName}">
                <input type="hidden" name="lastName" th:value="${lastName}">
                <input type="hidden" name="dob" th:value="${dob}">
                <input type="hidden" name="nurseId" th:value="${nurse.id}">
                <button type="submit" class="secondary-btn">
                    Leave a Message
                </button>
            </form>
        </div>
    </div>

    <div class="back-wrapper">
        <a class="back-link" th:href="@{/}">
            Back to Home
        </a>
    </div>

</div>

</body>
</html>
