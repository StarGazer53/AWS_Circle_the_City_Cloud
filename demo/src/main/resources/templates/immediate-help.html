<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Immediate Help</title>
    <style>
        body {
            background-color: #efefef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px 40px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 56px;
            margin-bottom: 15px;
            color: #1f1f1f;
        }

        .subtitle {
            text-align: center;
            font-size: 24px;
            margin-bottom: 40px;
            color: #555;
        }

        .nurse-card {
            display: flex;
            align-items: center;
            gap: 30px;
            background-color: #f8f9fb;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .nurse-card img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #dbe7ff;
            border: 1px solid #c3d3f7;
        }

        .nurse-info {
            font-size: 24px;
            line-height: 1.8;
            color: #222;
        }

        .busy-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 12px;
            background-color: #fff4f4;
            border: 1px solid #e7bcbc;
            text-align: center;
        }

        .busy-box p {
            font-size: 22px;
            color: #a12222;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        button,
        .link-button,
        .back-link {
            display: inline-block;
            padding: 14px 24px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .primary-btn {
            background-color: #2d72d9;
            color: white;
        }

        .primary-btn:hover {
            background-color: #1f5fbe;
        }

        .secondary-btn {
            background-color: #d9d9d9;
            color: #222;
        }

        .secondary-btn:hover {
            background-color: #c8c8c8;
        }

        .back-wrapper {
            text-align: center;
            margin-top: 35px;
        }

        .back-link {
            background-color: #f0f0f0;
            color: #1f1f1f;
        }

        .back-link:hover {
            background-color: #dfdfdf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${pageTitle}">Immediate Help</h1>
        <div class="subtitle" th:text="${subtitle}">Here is the first nurse available:</div>

        <div class="nurse-card">
            <img th:src="${nurse.imageUrl}" alt="Nurse Photo">

            <div class="nurse-info">
                <div>
                    <strong>Name:</strong>
                    <span th:text="${nurse.fullName}">Nurse Name</span>
                </div>
                <div>
                    <strong>Email:</strong>
                    <span th:text="${nurse.email}">email@example.com</span>
                </div>
                <div>
                    <strong>Phone:</strong>
                    <span th:text="${nurse.phoneNumber}">(555) 555-5555</span>
                </div>
                <div>
                    <strong>Department:</strong>
                    <span th:text="${nurse.department}">Department</span>
                </div>
            </div>
        </div>

        <div class="busy-box" th:if="${busy}">
            <p>
                This assigned nurse is currently busy.
                Would you like to leave a message or connect to the next available nurse?
            </p>

            <div class="button-row">
                <form th:action="@{/next-available-nurse}" method="post">
                    <button type="submit" class="primary-btn">Next Available Nurse</button>
                </form>

                <button type="button" class="secondary-btn"
                        onclick="alert('Leave a message feature coming soon.')">
                    Leave a Message
                </button>
            </div>
        </div>

        <div class="back-wrapper">
            <a class="back-link" th:href="@{/}">Back to Home</a>
        </div>
    </div>
</body>
</html>
